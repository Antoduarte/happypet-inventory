services:
  - type: web
    name: happypet-inventory
    runtime: python
    repo: https://github.com/Antoduarte/happypet-inventory
    plan: free
    region: oregon
    buildCommand: ./build.sh
    startCommand: cd backend && gunicorn config.wsgi:application --bind 0.0.0.0:$PORT --workers 4
    envVars:
      - key: DJANGO_SETTINGS_MODULE
        value: config.settings.production
      - key: DJANGO_SECRET_KEY
        generateValue: true
      - key: DJANGO_ALLOWED_HOSTS
        value: .onrender.com
      - key: CORS_ALLOWED_ORIGINS
        value: https://happypet-inventory.onrender.com
      - key: DATABASE_URL
        fromDatabase:
          name: happypet-db
          property: connectionString
      - key: NODE_VERSION
        value: 22

databases:
  - name: happypet-db
    plan: free
    region: oregon
    databaseName: happypet
    ipAllowList: []
